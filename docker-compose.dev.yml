# ======================================================================
# DEVELOPMENT COMPOSE CONFIGURATION
# Provides services required for local development. All configuration
# values are loaded from the project-level .env file. This file should
# not be used for production deployments.
# ======================================================================
services:

  # --------------------------------------------------------------------
  # Backend Application Service
  #
  # Builds the Django development image and runs the server with hot
  # reload enabled. The local project directory is bind-mounted to allow
  # code changes without rebuilding the container. Environment variables
  # such as DJANGO_DATABASE_URL and DJANGO_SETTINGS_MODULE are expected to be
  # defined in the root .env file.
  # --------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      target: dev
    container_name: backend-dev

    # Load environment variables from the root-level .env file
    env_file:
      - .env

    # Bind mount source code for live reload and interactive development
    volumes:
      - ./backend:/app

    # Expose Django development server
    ports:
      - "8000:8000"

    # Ensures the container restarts automatically if needed
    restart: unless-stopped

